wikicite.lcn.window.export-modal.p1=Déantar ailt a dhí-dhúbláil laistigh de tháblaí i gcónaí. Easpórtáil na táblaí seo a leanas:
wikicite.lcn.window.export-modal.ris.title=Oscail sa bhainisteoir tagartha (m.sh. Zotero)
wikicite.lcn.window.faq.citation.content.p1=Zúmáil trí scrollú agus panáil trí tharraingt. Seasann gach nód (= buaicphointe) d'alt. Tá siad ordaithe de réir bliana ón mbarr (níos nuaí) go dtí an bun (níos sine), agus gach bliain daite ar bhealach difriúil. Nó is féidir nóid a dhathú de réir iris an ailt i 'socruithe líonra'. Braitheann méid na nóid ar shuim 'Luaite', líon na luanna áitiúla isteach a fuair an páipéar ó na hAirteagail Síl, agus 'Ag Lua', líon na nAirteagal Síl a luann siad (luanna áitiúla amach). Ní ​​bhíonn líon na luanna áitiúla i gcomhréir i gcónaí le líon na luanna domhanda. Tá cruth ciorcail ar Ailt Síl (●). Seasann triantáin atá ag pointeáil suas (▲) do 'Top Cited', a luaitear ag na hAirteagail Síl.
wikicite.lcn.window.faq.citation.content.p2=Seasann gach imeall (= nasc / saighead) do lua: Is luanna amach iad dá nóid foinse agus luanna isteach dá nóid sprice. De ghnáth ní féidir le páipéir ach páipéir níos sine a lua, dá bhrí sin bíonn claonadh ag na himill a bheith ag pointeáil síos (nó ar thaobh le haghaidh luanna den bhliain chéanna). Go teicniúil, is graf neamhchiorclach dírithe é líonra luanna.
wikicite.lcn.window.faq.citation.header=Conas an líonra lua a léamh?
wikicite.lcn.window.faq.coauthorship.content.p1=Taispeánann an líonra comhúdair 'áitiúil' seo na húdair is coitianta i measc na nAirteagail Síolta. Ag brath ar an disciplín, is féidir le líon na (gcomh)údar i measc sraith d'ailt iolracha ardú go tapa go dtí na céadta, agus is é sin an fáth nach dtaispeánann an líonra údar seo ach údair a bhfuil líon íosta Airteagail Síolta acu (gan a bheith mearbhall lena líon domhanda foilseachán, atá níos airde de ghnáth). Socraítear an líon íosta réamhshocraithe d'Airteagail Síolta sa chaoi is nach dtaispeánann an líonra seo níos mó ná 50 údar, ach is féidir é a athrú leis an roghchlár anuas ag an mbun.
wikicite.lcn.window.faq.coauthorship.content.p2=Seasann gach nód (= buaicphointe) d’údar. Braitheann a méid ar líon a n-alt síl agus braitheann a ndath ar an gcéad alt síl nó an t-alt síl deireanach a chomhúdaraigh siad. Cliceáil údair chun ailt-táblaí a scagadh, ctrl+cliceáil chun níos mó ná údar amháin a scagadh. Tarraing nóid chun iad a ath-eagrú.
wikicite.lcn.window.faq.coauthorship.content.p3=Seasann gach imeall (= nasc) do chomhoibriú idir beirt údar i measc na n-alt síl, agus léiríonn an leithead líon na n-alt síl. Cliceáil ar na himill chun na hailt-táblaí a scagadh.
wikicite.lcn.window.faq.coauthorship.header=Conas an líonra comhúdair a léamh?
