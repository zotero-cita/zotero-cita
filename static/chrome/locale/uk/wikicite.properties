wikicite.prefs.citation-storage-desc=Cita може зберігати дані про цитати як примітку або в додатковому полі елементів бібліотеки. Рекомендований варіант — зберігати дані цитат у нотатках, оскільки метадані цитат можуть легко захаращувати додаткове поле. Зміна цього параметра призведе до переміщення наявних даних цитування до нового місця зберігання для всіх елементів у бібліотеці.
