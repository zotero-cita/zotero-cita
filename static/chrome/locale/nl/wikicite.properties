wikicite.lcn.window.faq.citation.content.p1=Zoom in door te scrollen en verschuif door te slepen. Elk knooppunt (= hoekpunt) vertegenwoordigt een artikel. Ze zijn gesorteerd op jaartal van boven (nieuwer) naar beneden (ouder), waarbij elk jaartal een andere kleur heeft. Als alternatief kunnen knooppunten ook worden gekleurd op basis van het tijdschrift van het artikel in de 'netwerkinstellingen'. De grootte van de knooppunten hangt af van de som van 'Geciteerd', het aantal lokale inkomende referenties dat het artikel heeft ontvangen van de Seed-artikelen, en 'Referenten', het aantal Seed-artikelen dat ze refereren (lokale uitgaande referenties). Het aantal lokale referenties is niet altijd evenredig met het aantal wereldwijde referenties. Seed-artikelen hebben een cirkelvorm (●). Omhoog wijzende driehoeken (▲) vertegenwoordigen 'Meest gerefereerd', dit zijn de artikelen die door de Seed-artikelen worden gerefereerd.
wikicite.lcn.window.faq.citation.header=Hoe lees je het citatie netwerk?
wikicite.lcn.window.faq.coauthorship.content.p1=Dit lokale co-auteursnetwerk toont de meest voorkomende auteurs in de betreffende artikelen. Afhankelijk van de discipline kan het aantal (co) auteurs onder een set van meerdere artikelen snel oplopen tot in de honderden, daarom toont dit auteursnetwerk alleen auteurs met een minimum aantal betreffende artikelen (niet te verwarren met hun globale aantal publicaties, wat meestal veel hoger is). Het minimum aantal betreffende artikelen wordt zo bepaald dat dit netwerk niet meer dan 50 auteurs toont, maar het kan met de dropdown onderaan gewijzigd worden.
wikicite.lcn.window.faq.coauthorship.content.p3=Elke rand (= koppeling) stelt een samenwerking voor van twee auteurs tussen de betreffende artikelen, waarbij de breedte het aantal betreffende artikelen aangeeft. Klik op randen om de artikeltabellen te filteren.
wikicite.lcn.window.faq.coauthorship.header=Hoe lees je het co-auteurschapsnetwerk?
