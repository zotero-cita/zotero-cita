wikicite.lcn.window.faq.citation.content.p1=Масштабування здійснюється прокручуванням, а панорамування – перетягуванням. Кожен вузол (вершина) представляє статтю. Вони впорядковані за роком від верху (новіші) до низу (старіші), причому кожен рік має різний колір. Крім того, вузли можна забарвити за журналом статті в «Налаштуваннях мережі». Розмір вузлів залежить від суми «Процитованих», кількості локальних вхідних цитувань, які стаття отримала з опорних статей, та «Цитування», кількості опорних статей, які вони цитують (локальні вихідні цитування). Кількість локальних цитувань не завжди пропорційна кількості глобальних цитувань. Опорні  статті мають форму кола (●). Трикутники, спрямовані вгору (▲), представляють «Найбільш цитовані», які цитуються опорними статтями.
wikicite.lcn.window.faq.citation.content.p2=Кожне ребро (посилання / стрілка) представляє цитату: це вихідні цитати для їхніх вихідних вузлів та вхідні цитати для їхніх цільових вузлів. Зазвичай статті можуть цитувати лише старіші статті, тому ребра, як правило, спрямовані вниз (або вбік для цитат того ж року). Технічно мережа цитат — це орієнтований ациклічний граф.
wikicite.lcn.window.faq.citation.header=Як читати мережу цитування?
wikicite.lcn.window.faq.coauthorship.content.p1=Ця «локальна» мережа співавторства показує найпоширеніших авторів серед опорних статей. Залежно від дисципліни, кількість (спів)авторів серед набору з кількох статей може швидко зрости до сотень, тому ця мережа авторів показує лише авторів з мінімальною кількістю опорних статей (не плутати з їхньою глобальною кількістю публікацій, яка зазвичай вища). Мінімальна кількість опорних статей за замовчуванням визначається таким чином, що ця мережа показує не більше 50 авторів, але її можна змінити за допомогою списку, що випадає.
wikicite.lcn.window.faq.coauthorship.content.p2=Кожен вузол (вершина) представляє автора. Їхній розмір залежить від кількості опорних статей, а колір – від першої або останньої опорної статті, співавторами якої вони є. Клацніть авторів, щоб фільтрувати статті-таблиці, Ctrl+клік, щоб фільтрувати більше одного автора. Перетягніть вузли, щоб змінити їх порядок.
wikicite.lcn.window.faq.coauthorship.content.p3=Кожне ребро (посилання) представляє співпрацю між двома авторами серед опорних статей, а ширина вказує на кількість опорних статей. Натисніть на ребра, щоб відфільтрувати статті-таблиці.
